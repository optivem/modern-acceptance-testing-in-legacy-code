name: commit-stage-frontend

on:
  push:
    branches: [ "main" ]
    paths:
        - 'frontend/**'
        - '.github/workflows/commit-stage-frontend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
        - 'frontend/**'
        - '.github/workflows/commit-stage-frontend.yml'
  workflow_dispatch:

concurrency:
  group: commit-stage-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Validate Config
        uses: optivem/actions/validate-config@v1
        with:
          names: |
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
        env:
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  run:
    needs: check
    runs-on: ubuntu-latest

    outputs:
      image-digest-url: ${{ steps.push.outputs.image-digest-url }}

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v5

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Setup Runtime
      uses: optivem/actions/setup-node@v1
      with:
        node-version: 22
        working-directory: frontend

    - name: Compile Code
      run: npm run build
      working-directory: frontend

    # - name: Run Unit Tests
    # - name: Run Narrow Integration Tests
    # - name: Run Component Tests
    # - name: Run Contract Tests
    - name: Run Linter
      run: npm run lint
      working-directory: frontend
    - name: Run Code Analysis
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: npx sonar-scanner -Dsonar.projectKey=optivem_eshop-frontend -Dsonar.organization=optivem -Dsonar.sources=src
      working-directory: frontend
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

    - name: Build Artifact
      if: github.ref == 'refs/heads/main'
      id: build
      uses: optivem/actions/build-docker-image@v1
      with:
        working-directory: frontend
        image-name: frontend
        image-namespace: ${{ github.repository }}
        commit-sha: ${{ github.sha }}
        dockerfile: Dockerfile

    - name: Push Artifact
      if: github.ref == 'refs/heads/main'
      id: push
      uses: optivem/actions/push-docker-image@v1
      with:
        image-sha-tag: ${{ steps.build.outputs.image-sha-tag }}
        image-latest-url: ${{ steps.build.outputs.image-latest-url }}
        registry-username: ${{ github.actor }}
      env:
        REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [check, run]
    if: always()
    runs-on: ubuntu-latest

    steps:

    - name: Summarize Commit Stage
      uses: optivem/actions/summarize-commit-stage@v1
      with:
        stage-result: ${{ needs.run.result }}
        success-artifact-url: ${{ needs.run.outputs.image-digest-url }}
